name: CI / gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  conventional-commits:
    name: Check Conventional Commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check for Conventional Commit compliance
        uses: tomtom-international/commisery-action@v4
        with:
          token: ${{ github.token }}

  unit-tests:
    uses: ./.github/workflows/run-tests.yml

  check-copyrights:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/check-copyrights.yml

  check-formatting:
    uses: ./.github/workflows/check-formatting.yml

  detekt:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/detekt.yml
    with:
      sha: ${{ github.event.pull_request.head.sha }}

  android-instrumentation-tests:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/android-instrumentation-tests.yml

  ios-build:
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/ios-build.yml

  wasm-build:
    permissions:
      contents: write
      actions: write
    uses: ./.github/workflows/wasm-build.yml

  gate:
    name: Required Checks Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [unit-tests, check-copyrights, check-formatting, detekt, android-instrumentation-tests, ios-build, wasm-build, conventional-commits]
    steps:
      - run: echo "All required checks passed"
