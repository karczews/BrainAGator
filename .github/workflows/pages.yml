name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'composeApp/**'
      - 'docs/webpages/**'
      - '.github/workflows/pages.yml'
      - 'gradle/**'
      - '*.gradle.kts'
      - '**/*.gradle.kts'
  workflow_dispatch:

# Allow only one concurrent deployment; do not cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build WASM and Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build WASM
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Copy WASM to webpages
        run: |
          rm -rf docs/webpages/app
          mkdir -p docs/webpages/app
          cp -r composeApp/build/dist/wasmJs/productionExecutable/* docs/webpages/app/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/webpages

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
