name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        uses: tomtom-international/commisery-action/bump@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-release: false
          create-tag: false

      - name: Set up JDK 21
        if: steps.version.outputs.next-version != ''
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.version.outputs.next-version != ''
        uses: gradle/actions/setup-gradle@v6

      - name: Write version code
        if: steps.version.outputs.next-version != ''
        run: echo "app.versionCode=$GITHUB_RUN_NUMBER" >> gradle.properties

      - name: Write version name
        if: steps.version.outputs.next-version != ''
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next-version }}
        run: echo "app.versionName=${NEXT_VERSION#v}" >> gradle.properties

      - name: Build Android APK
        if: steps.version.outputs.next-version != ''
        uses: ./.github/actions/android-release
        with:
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          key-password: ${{ secrets.KEY_PASSWORD }}

      - name: Build WASM bundle
        if: steps.version.outputs.next-version != ''
        run: ./gradlew :composeApp:wasmJsBrowserProductionWebpack

      - name: Decode keystore for Google Play publish
        if: steps.version.outputs.next-version != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > androidApp/android-release.jks
          chmod 600 androidApp/android-release.jks

      - name: Publish Android bundle to Google Play
        if: steps.version.outputs.next-version != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.ANDROID_PUBLISHER_CREDENTIALS }}
          NEXT_VERSION: ${{ steps.version.outputs.next-version }}
        run: ./gradlew :androidApp:publishBundle --release-name "${NEXT_VERSION#v}"

      - name: Cleanup Google Play keystore
        if: always()
        run: rm -f androidApp/android-release.jks

      - name: Create release
        if: steps.version.outputs.next-version != ''
        uses: tomtom-international/commisery-action/bump@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-release: true
          create-tag: true

      - name: Upload Android APK to release
        if: steps.version.outputs.next-version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.next-version }}
          files: androidApp/build/outputs/apk/release/androidApp-release.apk
          fail_on_unmatched_files: false

      - name: Upload WASM bundle to release
        if: steps.version.outputs.next-version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.next-version }}
          files: composeApp/build/dist/wasmJs/**
          fail_on_unmatched_files: false

      - name: Report release status
        run: |
          if [ -n "${{ steps.version.outputs.next-version }}" ]; then
            echo "✅ New version created: ${{ steps.version.outputs.next-version }}"
          else
            echo "ℹ️ No new version created - no version bump needed"
          fi
