name: Android Release Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Write version code
        run: echo "app.versionCode=$GITHUB_RUN_NUMBER" >> gradle.properties

      - name: Write version name
        run: |
          if ! VERSION_NAME=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null); then
            echo "::error::No release tag found (expected format: vX.Y.Z)."
            exit 1
          fi
          echo "app.versionName=${VERSION_NAME#v}" >> gradle.properties

      - name: Build release APK
        uses: ./.github/actions/android-release
        with:
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          key-password: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: androidApp/build/outputs/apk/release/androidApp-release.apk
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: androidApp/build/outputs/bundle/release/androidApp-release.aab
          retention-days: 7
