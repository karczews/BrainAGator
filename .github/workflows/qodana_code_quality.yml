name: Qodana
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      sha:
        required: false
        type: string
    secrets:
      QODANA_TOKEN:
        required: true
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha || github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      # JDK 17 for consistency with other workflows (supports JVM 11 target for Android)
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          # Enable cache writes for PRs to speed up subsequent builds
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: ${{ github.event_name == 'pull_request' }}
          cache-default-branch-only: true
          upload-result: true
          use-caches: true
          # Stable cache keys based on dependency files instead of SHA
          primary-cache-key: qodana-2025.3-${{ hashFiles('**/gradle/libs.versions.toml', '**/gradle/wrapper/gradle-wrapper.properties') }}
          additional-cache-key: qodana-2025.3
          args: --property,gradle.ide.support.future.agp.versions=true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

      - name: Upload Qodana SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
