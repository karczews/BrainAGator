####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm-android:2025.3
profile:
  name: qodana.recommended

# JDK 17 for consistency with other workflows (supports JVM 11 target for Android)
projectJDK: corretto-17

# Include additional inspections
include:
  - name: CheckDependencyLicenses

# Kotlin Multiplatform specific exclusions
exclude:
  - name: All
    paths:
      - build
      - .gradle
      - .kotlin
      - "**/build"
      - "**/.gradle"
      - "**/.kotlin"
      - iosApp
      - "**/iosApp/**"

# Bootstrap commands to prepare the project
bootstrap: |
  ./gradlew :composeApp:dependencies --configuration androidCompileClasspath --quiet || true

# Quality gate configuration
failureConditions:
  severityThresholds:
    any: 100
    critical: 0
    high: 10
    moderate: 50
    low: 100
    info: 100
